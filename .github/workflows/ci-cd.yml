name: CI/CD - Fiap Cloud Games

# Dispara automaticamente em push/PR na master e permite rodar manualmente
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: 'Fiap.Game.sln'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fiapcloudgames

jobs:
  # CI: build, testes, SonarCloud e artefato
  build-test-sonar:
    name: CI - Build, Testes e SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud precisa do histórico completo

      - name: Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configurar JDK 17 (necessário para o SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache de pacotes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Instalar dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore das dependências
        run: dotnet restore "${{ env.SOLUTION }}"

      - name: SonarCloud - Begin
        continue-on-error: true   # nao quebra a esteira se o SonarCloud estiver instavel
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/Program.cs,**/*Tests*/**"

      - name: Compilação do código
        run: dotnet build "${{ env.SOLUTION }}" -c Release --no-restore

      - name: Execução dos testes automatizados (com cobertura)
        run: |
          dotnet test "${{ env.SOLUTION }}" -c Release --no-build \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

      - name: SonarCloud - End
        continue-on-error: true   # nao quebra a esteira se o SonarCloud estiver instavel
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Publicar artefato da aplicação
        run: dotnet publish "Fiap.Game.Api/Fiap.Game.Api.csproj" -c Release -o ./publish /p:UseAppHost=false

      - name: Upload do artefato de publicação
        uses: actions/upload-artifact@v4
        with:
          name: fiapcloudgames-app
          path: ./publish
          retention-days: 7

      - name: Upload dos resultados de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

  # Build e push da imagem no Docker Hub
  docker-publish:
    name: Build e Push no Docker Hub
    runs-on: ubuntu-latest
    needs: build-test-sonar
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir tags da imagem
        id: meta
        run: |
          echo "image=${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build e Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Fiap.Game.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CD: deploy no LocalStack (self-hosted runner)
  deploy-localstack:
    name: CD - Deploy no LocalStack
    runs-on: [self-hosted]
    needs: docker-publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar deploy no LocalStack (PowerShell)
        shell: powershell
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: ./deploy/deploy-localstack.ps1 -ImageName "$env:IMAGE_NAME" -Tag "latest"
